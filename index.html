<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Location Tracker</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <style>
    html, body, #map{
      height: 100%;
      margin: 0;
    }


  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([0, 0], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors - Mekalfone Group - TeamX'
    }).addTo(map);

    let marker = null;
    let path = [];
    const storedPath = localStorage.getItem('trackerPath');
    if (storedPath) {
      try {
        path = JSON.parse(storedPath);
      } catch (e) {
        path = [];
      }
    }
    let polyline = L.polyline(path).addTo(map);

    // If path exists, set marker at last position
    if (path.length > 0) {
      const lastPos = path[path.length - 1];
      marker = L.marker(lastPos).addTo(map).bindPopup('You are here');
      map.setView(lastPos, 16);
    }

    function onSuccess(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      if (!marker) {
        marker = L.marker([lat, lng]).addTo(map).bindPopup('You are here');
        map.setView([lat, lng], 16);
      } else {
        marker.setLatLng([lat, lng]);
      }

      path.push([lat, lng]);
      polyline.setLatLngs(path);
      localStorage.setItem('trackerPath', JSON.stringify(path));
    }

    function onError(error) {
      alert('Location error: ' + error.message);
    }

    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      });
    } else {
      alert('Geolocation is not supported in this browser.');
    }
  </script>
</body>
</html>
