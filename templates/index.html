<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Location Tracker</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <style>
    html, body, #map{
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const map = L.map('map').setView([0, 0], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors - Mekalfone Group - TeamX'
    }).addTo(map);

    const socket = io();
    let userId = null;
    const userPolylines = {};
    const userPointMarkers = {};
    const colors = ['red', 'blue', 'green', 'orange', 'purple', 'yellow'];

    socket.on('user_id', (id) => {
      userId = id;
    });

    socket.on('update_user_path', (data) => {
      const { user_id, path } = data;
      if (!userPolylines[user_id]) {
        const color = colors[Object.keys(userPolylines).length % colors.length];
        userPolylines[user_id] = L.polyline(path, {color: color}).addTo(map);
        userPointMarkers[user_id] = [];
        for (let i = 0; i < path.length; i++) {
          const marker = L.circleMarker(path[i], {color: color, radius: 5}).addTo(map);
          userPointMarkers[user_id].push(marker);
        }
      } else {
        // Remove old point markers
        userPointMarkers[user_id].forEach(marker => map.removeLayer(marker));
        userPointMarkers[user_id] = [];
        // Add new point markers
        for (let i = 0; i < path.length; i++) {
          const marker = L.circleMarker(path[i], {color: userPolylines[user_id].options.color, radius: 5}).addTo(map);
          userPointMarkers[user_id].push(marker);
        }
        userPolylines[user_id].setLatLngs(path);
      }
      if (path.length > 0) {
        map.setView(path[path.length - 1], 16);
      }
    });

    socket.on('user_disconnected', (disconnectedUserId) => {
      if (userPointMarkers[disconnectedUserId]) {
        userPointMarkers[disconnectedUserId].forEach(marker => map.removeLayer(marker));
        delete userPointMarkers[disconnectedUserId];
      }
      if (userPolylines[disconnectedUserId]) {
        map.removeLayer(userPolylines[disconnectedUserId]);
        delete userPolylines[disconnectedUserId];
      }
    });

    function sendLocation(lat, lng) {
      socket.emit('location_update', { lat, lng });
    }

    function onSuccess(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      sendLocation(lat, lng);
    }

    function onError(error) {
      console.error('Location error:', error.message);
    }

    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      });
    } else {
      alert('Geolocation is not supported in this browser.');
    }
  </script>
</body>
</html>
