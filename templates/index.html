<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Location Tracker</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <style>
    html, body, #map{
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const map = L.map('map').setView([0, 0], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors - Mekalfone Group - TeamX'
    }).addTo(map);

    const socket = io();
    let userId = null;
    const userMarkers = {};
    const userPolylines = {};
    const colors = ['red', 'blue', 'green', 'orange', 'purple', 'yellow'];

    socket.on('user_id', (id) => {
      userId = id;
    });

    socket.on('update_user_path', (data) => {
      const { user_id, path } = data;
      if (!userPolylines[user_id]) {
        const color = colors[Object.keys(userPolylines).length % colors.length];
        userPolylines[user_id] = L.polyline(path, {color: color}).addTo(map);
        userMarkers[user_id] = L.marker(path[path.length - 1], {color: color}).addTo(map).bindPopup(`User ${user_id}`);
      } else {
        userPolylines[user_id].setLatLngs(path);
        userMarkers[user_id].setLatLng(path[path.length - 1]);
      }
      if (path.length > 0) {
        map.setView(path[path.length - 1], 16);
      }
    });

    socket.on('user_disconnected', (disconnectedUserId) => {
      if (userMarkers[disconnectedUserId]) {
        map.removeLayer(userMarkers[disconnectedUserId]);
        delete userMarkers[disconnectedUserId];
      }
      if (userPolylines[disconnectedUserId]) {
        map.removeLayer(userPolylines[disconnectedUserId]);
        delete userPolylines[disconnectedUserId];
      }
    });

    function sendLocation(lat, lng) {
      socket.emit('location_update', { lat, lng });
    }

    function onSuccess(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      sendLocation(lat, lng);
    }

    function onError(error) {
      console.error('Location error:', error.message);
    }

    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      });
    } else {
      alert('Geolocation is not supported in this browser.');
    }
  </script>
</body>
</html>
